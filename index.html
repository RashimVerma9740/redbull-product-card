<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Red Bull Interactive Product Card</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="card">
    <div class="circle">
      <img src="redbull-logo.png" class="logo" alt="Red Bull Logo">
    </div>

    <div class="content">
      <h2>Red Bull</h2>
      <p>Energy drink that gives you wings. Perfect for focus, energy, and performance.</p>
      <a href="#">Buy Now</a>
    </div>

    <img src="redbull-can.png" class="product-img" alt="Red Bull Can">
  </div>

</body>
</html>
